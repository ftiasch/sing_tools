route:
  before_rules:
    - inbound: tun-in
      action: sniff
    - protocol: dns
      ip_cidr: 223.5.5.5
      action: hijack-dns
    - protocol: dns
      ip_cidr:
        - 172.16.0.2/32
        - fd00::2/128
      action: hijack-dns
    - port: [3478, 41641]
      protocol: udp
      outbound: direct
    - domain_regex: ["^derp.+\\.tailscale\\.com"]
      outbound: direct
    - process_name:
        - easytier-core
        - tailscaled
      outbound: direct
    - ip_is_private: true
      outbound: direct
    - type: logical
      mode: and
      rules:
        - rule_set: geosite-category-ai-!cn
          invert: true
        - rule_set: geosite-google
      outbound: proxy-out
    - rule_set: geoip-cn
      outbound: direct
    - rule_set: geosite-geolocation-cn
      outbound: direct
    - type: logical
      mode: and
      rules:
        - rule_set: geosite-geolocation-!cn
          invert: true
        - rule_set: geoip-cn
      outbound: direct
    - domain_suffix:
        - codeforces.com
      outbound: direct
    - rule_set:
        - geosite-apple@cn
        - geosite-category-game-platforms-download
        - geosite-category-games-cn
        - geosite-microsoft@cn
        - geosite-steam
      outbound: direct
    - domain_suffix:
        - aur.archlinux.org
      outbound: us-out
    - rule_set:
        - geosite-category-ai-!cn
      outbound: us-out
